<div class="role-grid">
  <div class="header-container">
    <h1 class="main-title">Acceso a <span style="color: var(--primary-color);">WorkFlow</span></h1>
    <p class="sub-title">Por favor, selecciona tu perfil para ingresar a la plataforma</p>
  </div>
  
  <div class="cards-wrapper">
    <div class="h-card designer-card" (click)="selectRole('designer')">
      <div class="h-icon-box">
        <span nz-icon nzType="edit" nzTheme="outline"></span>
      </div>
      <div class="h-content">
        <h3>Diseñador de Procesos</h3>
        <p>Crea, edita y gestiona diagramas BPMN y flujos de negocio complejos.</p>
      </div>
      <div class="h-arrow">
        <span nz-icon nzType="arrow-right" nzTheme="outline"></span>
      </div>
    </div>

    <div class="h-card staff-card" (click)="selectRole('staff')">
      <div class="h-icon-box">
        <span nz-icon nzType="user" nzTheme="outline"></span>
      </div>
      <div class="h-content">
        <h3>Funcionario Operativo</h3>
        <p>Visualiza procesos asignados, reporta estados y consulta políticas.</p>
      </div>
      <div class="h-arrow">
        <span nz-icon nzType="arrow-right" nzTheme="outline"></span>
      </div>
    </div>
  </div>
</div>
